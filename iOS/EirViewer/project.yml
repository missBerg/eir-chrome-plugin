name: EirViewer
options:
  bundleIdPrefix: com.eir
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

packages:
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: "5.0.0"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    revision: 68b82ece72d41c02170a1aa28dbbc2d36678e924
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: "0.30.6"
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    branch: main
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    branch: main

targets:
  EirViewer:
    type: application
    platform: iOS
    sources:
      - path: Sources/EirViewer
      - path: Resources
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: EirViewer.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.eir.viewer
        MARKETING_VERSION: "1.0.3"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: YJ9A3JT299
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Eir uses the microphone so you can dictate questions and notes for AI assistance.
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: Eir uses speech recognition to turn voice check-ins into text.
    dependencies:
      - package: Yams
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: mlx-swift
        product: MLX
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Tokenizers
      - sdk: HealthKit.framework
      - sdk: Speech.framework

  EirViewerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/EirViewerTests
    dependencies:
      - target: EirViewer
      - package: Yams
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
