forms:
  - id: "adhd"
    title: "ADHD Self-Check"
    subtitle: "Adult ADHD Self-Report Scale (ASRS v1.1) Screener"
    themeColor: "#6366f1"
    category: "Neuro"
    description: >-
      Explore attention, organization, and activity patterns over the past six months. This quick screener cannot provide a
      diagnosis, but it can highlight patterns worth discussing with a clinician.
    instructions:
      - "Answer based on your experiences during the last six months."
      - "There are no right or wrong responses — choose what feels most accurate."
      - "Use the results to guide conversations with your care team."
    scale:
      label: "Frequency"
      options:
        - label: "Never"
          value: 0
        - label: "Rarely"
          value: 1
        - label: "Sometimes"
          value: 2
        - label: "Often"
          value: 3
        - label: "Very often"
          value: 4
    questions:
      - id: "adhd_inattention_1"
        text: "How often do you struggle to finish the final details of a project once the challenging parts are complete?"
        dimension: "Inattention"
      - id: "adhd_inattention_2"
        text: "How frequently do you have difficulty staying organized when tasks require follow-through?"
        dimension: "Inattention"
      - id: "adhd_inattention_3"
        text: "How often do you forget appointments or obligations?"
        dimension: "Inattention"
      - id: "adhd_hyper_1"
        text: "When you must sit for long periods, how often do you fidget or move your hands and feet?"
        dimension: "Hyperactivity"
      - id: "adhd_hyper_2"
        text: "How often do you feel overly active and compelled to do things, as if driven by a motor?"
        dimension: "Hyperactivity"
      - id: "adhd_hyper_3"
        text: "How frequently do you leave your seat in situations where remaining seated is expected?"
        dimension: "Hyperactivity"
    scoring:
      method: "average"
      overall:
        label: "Overall ADHD indication"
        bands:
          - min: 0
            max: 1.5
            label: "Low"
            color: "#10b981"
            description: "Your responses do not strongly align with ADHD traits."
          - min: 1.51
            max: 2.6
            label: "Elevated"
            color: "#f59e0b"
            description: "You reported several challenges worth monitoring."
          - min: 2.61
            max: 4
            label: "High"
            color: "#ef4444"
            description: "Consider sharing these results with a clinician for a full assessment."
      dimensions:
        - id: "Inattention"
          label: "Inattention"
          description: "Focus, organization, and task completion."
          bands:
            - min: 0
              max: 1.5
              label: "Strength"
            - min: 1.51
              max: 2.6
              label: "Watchful"
            - min: 2.61
              max: 4
              label: "Needs support"
        - id: "Hyperactivity"
          label: "Hyperactivity & Impulsivity"
          description: "Inner restlessness, impulsive actions, and energy regulation."
          bands:
            - min: 0
              max: 1.5
              label: "Balanced"
            - min: 1.51
              max: 2.6
              label: "Elevated"
            - min: 2.61
              max: 4
              label: "Needs support"

  - id: "asd"
    title: "Autism Spectrum Clues"
    subtitle: "Social communication & sensory pattern check"
    themeColor: "#0ea5e9"
    category: "Neuro"
    description: >-
      This reflective checklist looks at key autistic traits including sensory preferences, communication style, and need for
      routine. Use it to organize observations before speaking with a professional.
    instructions:
      - "Think about your typical experiences across social, sensory, and routine situations."
      - "Choose the option that best matches how true each statement feels for you."
    scale:
      label: "Agreement"
      options:
        - label: "Not at all"
          value: 0
        - label: "Slightly"
          value: 1
        - label: "Somewhat"
          value: 2
        - label: "Mostly"
          value: 3
        - label: "Very much"
          value: 4
    questions:
      - id: "asd_social_1"
        text: "I find back-and-forth conversations tiring or confusing."
        dimension: "Social Communication"
      - id: "asd_social_2"
        text: "Understanding social cues (like tone or facial expressions) takes effort for me."
        dimension: "Social Communication"
      - id: "asd_routine_1"
        text: "Changes to my plans or routines cause significant stress."
        dimension: "Routines"
      - id: "asd_routine_2"
        text: "I rely on structured rituals to feel calm."
        dimension: "Routines"
      - id: "asd_sensory_1"
        text: "I notice sounds, textures, or lights that others do not."
        dimension: "Sensory"
      - id: "asd_sensory_2"
        text: "Overwhelming sensory input can lead me to withdraw or shut down."
        dimension: "Sensory"
      - id: "asd_focus_1"
        text: "I can focus intensely on interests for long periods without losing motivation."
        dimension: "Focused Interests"
      - id: "asd_focus_2"
        text: "My special interests bring me comfort and stability."
        dimension: "Focused Interests"
    scoring:
      method: "average"
      overall:
        label: "Alignment with autistic traits"
        bands:
          - min: 0
            max: 1.3
            label: "Low"
            color: "#10b981"
            description: "Few experiences align with core autistic traits."
          - min: 1.31
            max: 2.6
            label: "Moderate"
            color: "#f97316"
            description: "Some consistent autistic patterns are present."
          - min: 2.61
            max: 4
            label: "High"
            color: "#ef4444"
            description: "Many experiences match autistic traits — consider a formal assessment."
      dimensions:
        - id: "Social Communication"
          label: "Social Communication"
          description: "Comfort with dialogue, cues, and connection."
          bands:
            - min: 0
              max: 1.3
              label: "Supportive"
            - min: 1.31
              max: 2.6
              label: "Mindful"
            - min: 2.61
              max: 4
              label: "Challenging"
        - id: "Routines"
          label: "Need for Routines"
          description: "Preference for predictability and structure."
          bands:
            - min: 0
              max: 1.3
              label: "Flexible"
            - min: 1.31
              max: 2.6
              label: "Structured"
            - min: 2.61
              max: 4
              label: "Highly structured"
        - id: "Sensory"
          label: "Sensory Processing"
          description: "Sensitivity to sensory environments."
          bands:
            - min: 0
              max: 1.3
              label: "Regulated"
            - min: 1.31
              max: 2.6
              label: "Attentive"
            - min: 2.61
              max: 4
              label: "Intense"
        - id: "Focused Interests"
          label: "Focused Interests"
          description: "Depth of interest-based focus."
          bands:
            - min: 0
              max: 1.3
              label: "Casual"
            - min: 1.31
              max: 2.6
              label: "Dedicated"
            - min: 2.61
              max: 4
              label: "Immersive"

  - id: "depression"
    title: "Mood & Energy Check"
    subtitle: "PHQ-9 inspired depression screener"
    themeColor: "#f97316"
    category: "Mental"
    description: >-
      Monitor how symptoms of low mood, energy, and motivation have been present during the past two weeks. This tool is based on
      the widely used PHQ-9 questionnaire.
    instructions:
      - "Reflect on your experiences over the last 14 days."
      - "Consider how often each statement has been true for you."
    scale:
      label: "Frequency"
      options:
        - label: "Not at all"
          value: 0
        - label: "Several days"
          value: 1
        - label: "More than half the days"
          value: 2
        - label: "Nearly every day"
          value: 3
    questions:
      - id: "phq_interest"
        text: "Little interest or pleasure in doing things"
        dimension: "Anhedonia"
      - id: "phq_down"
        text: "Feeling down, depressed, or hopeless"
        dimension: "Mood"
      - id: "phq_sleep"
        text: "Trouble falling or staying asleep, or sleeping too much"
        dimension: "Somatic"
      - id: "phq_energy"
        text: "Feeling tired or having little energy"
        dimension: "Somatic"
      - id: "phq_appetite"
        text: "Poor appetite or overeating"
        dimension: "Somatic"
      - id: "phq_self"
        text: "Feeling bad about yourself — or that you are a failure"
        dimension: "Self-worth"
      - id: "phq_focus"
        text: "Trouble concentrating on things, such as reading or watching TV"
        dimension: "Cognitive"
      - id: "phq_movement"
        text: "Moving or speaking slowly, or being fidgety and restless"
        dimension: "Somatic"
      - id: "phq_harm"
        text: "Thoughts that you would be better off dead, or hurting yourself"
        dimension: "Safety"
    scoring:
      method: "sum"
      overall:
        label: "Depression severity"
        bands:
          - min: 0
            max: 4
            label: "Minimal"
            color: "#22c55e"
            description: "Symptoms are minimal; continue healthy habits."
          - min: 5
            max: 9
            label: "Mild"
            color: "#facc15"
            description: "Watch for changes and consider early supports."
          - min: 10
            max: 14
            label: "Moderate"
            color: "#f97316"
            description: "Consider speaking with a clinician or counselor."
          - min: 15
            max: 27
            label: "Severe"
            color: "#dc2626"
            description: "Reach out to a professional or crisis service promptly."
      dimensions:
        - id: "Somatic"
          label: "Physical energy & body rhythms"
          bands:
            - min: 0
              max: 2
              label: "Stable"
            - min: 3
              max: 5
              label: "Shifted"
            - min: 6
              max: 9
              label: "Strained"
        - id: "Mood"
          label: "Emotional tone"
          bands:
            - min: 0
              max: 0
              label: "Balanced"
            - min: 1
              max: 2
              label: "Tender"
            - min: 3
              max: 3
              label: "Heavy"
        - id: "Cognitive"
          label: "Thinking & focus"
          bands:
            - min: 0
              max: 0
              label: "Clear"
            - min: 1
              max: 2
              label: "Foggy"
            - min: 3
              max: 3
              label: "Impaired"
        - id: "Self-worth"
          label: "Self-perception"
          bands:
            - min: 0
              max: 0
              label: "Grounded"
            - min: 1
              max: 1
              label: "Tender"
            - min: 2
              max: 3
              label: "Hurting"
        - id: "Anhedonia"
          label: "Joy & motivation"
          bands:
            - min: 0
              max: 0
              label: "Engaged"
            - min: 1
              max: 1
              label: "Blunted"
            - min: 2
              max: 3
              label: "Flat"
        - id: "Safety"
          label: "Safety signals"
          bands:
            - min: 0
              max: 0
              label: "Safe"
            - min: 1
              max: 1
              label: "Needs monitoring"
            - min: 2
              max: 3
              label: "Urgent"

  - id: "social-phobia"
    title: "Social Confidence Pulse"
    subtitle: "Mini Social Phobia Inventory"
    themeColor: "#8b5cf6"
    category: "Mental"
    description: >-
      Notice how anxiety shows up in social situations, from physical sensations to avoidance patterns. This brief inventory is
      inspired by the SPIN screening tool.
    instructions:
      - "Respond with what has been typical for you in the last month."
      - "Use the results to identify areas to practice compassion and coping strategies."
    scale:
      label: "Intensity"
      options:
        - label: "Not at all"
          value: 0
        - label: "A little"
          value: 1
        - label: "Somewhat"
          value: 2
        - label: "Very"
          value: 3
        - label: "Extremely"
          value: 4
    questions:
      - id: "spin_fear"
        text: "Fear of embarrassing yourself in front of others"
        dimension: "Fear"
      - id: "spin_avoid"
        text: "Avoiding social situations because of anxiety"
        dimension: "Avoidance"
      - id: "spin_body"
        text: "Experiencing physical symptoms (blushing, shaking, sweating) in social settings"
        dimension: "Body"
      - id: "spin_speaking"
        text: "Fear of speaking in front of a group"
        dimension: "Fear"
      - id: "spin_stranger"
        text: "Anxiety when meeting new people"
        dimension: "Avoidance"
      - id: "spin_review"
        text: "Replaying conversations to look for mistakes"
        dimension: "Thoughts"
    scoring:
      method: "sum"
      overall:
        label: "Social anxiety signal"
        bands:
          - min: 0
            max: 7
            label: "Low"
            color: "#10b981"
            description: "Manageable worry — continue supportive habits."
          - min: 8
            max: 14
            label: "Moderate"
            color: "#facc15"
            description: "Noticeable anxiety — coping strategies may help."
          - min: 15
            max: 24
            label: "High"
            color: "#f97316"
            description: "Consider guided support to build confidence."
          - min: 25
            max: 30
            label: "Very high"
            color: "#dc2626"
            description: "Professional support can help reduce distress."
      dimensions:
        - id: "Fear"
          label: "Fear response"
          bands:
            - min: 0
              max: 3
              label: "Calm"
            - min: 4
              max: 6
              label: "Sensitive"
            - min: 7
              max: 8
              label: "Reactive"
        - id: "Avoidance"
          label: "Avoidance pattern"
          bands:
            - min: 0
              max: 3
              label: "Engaged"
            - min: 4
              max: 6
              label: "Protective"
            - min: 7
              max: 8
              label: "Limiting"
        - id: "Body"
          label: "Body sensations"
          bands:
            - min: 0
              max: 1
              label: "Steady"
            - min: 2
              max: 3
              label: "Noticing"
            - min: 4
              max: 4
              label: "Intense"
        - id: "Thoughts"
          label: "Thinking patterns"
          bands:
            - min: 0
              max: 1
              label: "Flexible"
            - min: 2
              max: 2
              label: "Evaluating"
            - min: 3
              max: 4
              label: "Ruminating"

  - id: "ocean"
    title: "Personality Snapshot"
    subtitle: "Big Five (OCEAN) mini inventory"
    themeColor: "#fbbf24"
    category: "Personality"
    description: >-
      Rate how well each statement describes you. The five trait domains outline broad tendencies — they are not scores of
      success or failure.
    instructions:
      - "Answer instinctively; your first impression is usually most accurate."
      - "Imagine how you generally show up across situations."
    scale:
      label: "Agreement"
      options:
        - label: "Strongly disagree"
          value: 1
        - label: "Disagree"
          value: 2
        - label: "Neutral"
          value: 3
        - label: "Agree"
          value: 4
        - label: "Strongly agree"
          value: 5
    questions:
      - id: "ocean_o1"
        text: "I enjoy exploring new ideas."
        dimension: "Openness"
      - id: "ocean_o2"
        text: "I appreciate art, music, or creative experiences."
        dimension: "Openness"
      - id: "ocean_c1"
        text: "I keep my spaces organized."
        dimension: "Conscientiousness"
      - id: "ocean_c2"
        text: "I follow through on my plans."
        dimension: "Conscientiousness"
      - id: "ocean_e1"
        text: "I feel energized by social gatherings."
        dimension: "Extraversion"
      - id: "ocean_e2"
        text: "I take the lead in group conversations."
        dimension: "Extraversion"
      - id: "ocean_a1"
        text: "I value helping others feel at ease."
        dimension: "Agreeableness"
      - id: "ocean_a2"
        text: "I am considerate and kind toward others."
        dimension: "Agreeableness"
      - id: "ocean_n1"
        text: "I get stressed easily."
        dimension: "Neuroticism"
      - id: "ocean_n2"
        text: "I often worry about things outside my control."
        dimension: "Neuroticism"
    scoring:
      method: "average"
      overall:
        label: "Trait balance"
        bands:
          - min: 1
            max: 2.2
            label: "Introverted-Calm"
            color: "#38bdf8"
            description: "More inward, steady energy overall."
          - min: 2.21
            max: 3.8
            label: "Balanced"
            color: "#22c55e"
            description: "A blend of reflective and expressive traits."
          - min: 3.81
            max: 5
            label: "Expressive"
            color: "#f97316"
            description: "High social drive and emotional intensity."
      dimensions:
        - id: "Openness"
          label: "Openness"
          description: "Curiosity, creativity, and imagination."
          bands:
            - min: 1
              max: 2.4
              label: "Grounded"
            - min: 2.41
              max: 3.6
              label: "Curious"
            - min: 3.61
              max: 5
              label: "Exploratory"
        - id: "Conscientiousness"
          label: "Conscientiousness"
          description: "Organization and goal-directed behavior."
          bands:
            - min: 1
              max: 2.4
              label: "Flexible"
            - min: 2.41
              max: 3.6
              label: "Steady"
            - min: 3.61
              max: 5
              label: "Purposeful"
        - id: "Extraversion"
          label: "Extraversion"
          description: "Sociability and assertiveness."
          bands:
            - min: 1
              max: 2.4
              label: "Reserved"
            - min: 2.41
              max: 3.6
              label: "Engaging"
            - min: 3.61
              max: 5
              label: "Outgoing"
        - id: "Agreeableness"
          label: "Agreeableness"
          description: "Compassion and cooperation."
          bands:
            - min: 1
              max: 2.4
              label: "Candid"
            - min: 2.41
              max: 3.6
              label: "Warm"
            - min: 3.61
              max: 5
              label: "Nurturing"
        - id: "Neuroticism"
          label: "Emotional sensitivity"
          description: "Experience of worry and mood shifts (higher scores mean more sensitivity)."
          bands:
            - min: 1
              max: 2.4
              label: "Even-keeled"
            - min: 2.41
              max: 3.6
              label: "Attentive"
            - min: 3.61
              max: 5
              label: "Vigilant"

  - id: "attachment"
    title: "Attachment Style Reflections"
    subtitle: "Experiences in close relationships"
    themeColor: "#34d399"
    category: "Personality"
    description: >-
      Consider how you typically feel and respond in close relationships. These prompts are inspired by the Experiences in Close
      Relationships short form.
    instructions:
      - "Think about your feelings in meaningful romantic or intimate relationships."
      - "If you are not currently partnered, respond based on past experiences."
    scale:
      label: "Agreement"
      options:
        - label: "Strongly disagree"
          value: 1
        - label: "Disagree"
          value: 2
        - label: "Neutral"
          value: 3
        - label: "Agree"
          value: 4
        - label: "Strongly agree"
          value: 5
    questions:
      - id: "attach_anx1"
        text: "I worry that my partner does not love me as much as I love them."
        dimension: "Anxious"
      - id: "attach_anx2"
        text: "I need a lot of reassurance from close partners."
        dimension: "Anxious"
      - id: "attach_anx3"
        text: "I find myself craving closeness and fearing distance."
        dimension: "Anxious"
      - id: "attach_avoid1"
        text: "I prefer not to rely on others even when I need support."
        dimension: "Avoidant"
      - id: "attach_avoid2"
        text: "I feel uncomfortable when people get too close emotionally."
        dimension: "Avoidant"
      - id: "attach_avoid3"
        text: "I value independence more than emotional intimacy."
        dimension: "Avoidant"
      - id: "attach_secure1"
        text: "I am comfortable depending on my partner and having them depend on me."
        dimension: "Secure"
      - id: "attach_secure2"
        text: "I feel confident about my partner's care and commitment."
        dimension: "Secure"
    scoring:
      method: "average"
      overall:
        label: "Attachment orientation"
        bands:
          - min: 1
            max: 2.5
            label: "Security-leaning"
            color: "#22c55e"
            description: "Responses reflect comfort with closeness and autonomy."
          - min: 2.51
            max: 3.5
            label: "Mixed"
            color: "#facc15"
            description: "You may shift between reassurance-seeking and distancing."
          - min: 3.51
            max: 5
            label: "Protective"
            color: "#ef4444"
            description: "Patterns suggest strong anxious or avoidant strategies."
      dimensions:
        - id: "Secure"
          label: "Secure base"
          description: "Comfort with closeness and trust."
          bands:
            - min: 1
              max: 2.4
              label: "Lower"
            - min: 2.41
              max: 3.6
              label: "Balanced"
            - min: 3.61
              max: 5
              label: "Abundant"
        - id: "Anxious"
          label: "Anxious activation"
          description: "Need for reassurance and fear of loss."
          bands:
            - min: 1
              max: 2.4
              label: "Calm"
            - min: 2.41
              max: 3.6
              label: "Watchful"
            - min: 3.61
              max: 5
              label: "High alert"
        - id: "Avoidant"
          label: "Avoidant distancing"
          description: "Preference for independence over closeness."
          bands:
            - min: 1
              max: 2.4
              label: "Comfortable"
            - min: 2.41
              max: 3.6
              label: "Balancing"
            - min: 3.61
              max: 5
              label: "Protective"

  - id: "general-anxiety"
    title: "Generalized Anxiety Check"
    subtitle: "GAD-7 inspired worry & anxiety screener"
    themeColor: "#ec4899"
    category: "Mental"
    description: >-
      Notice patterns of worry, restlessness, and tension that extend beyond specific situations. This screener looks at general
      anxiety patterns over the past two weeks.
    instructions:
      - "Reflect on your experiences over the last 14 days."
      - "Consider how often you've been bothered by worry and anxiety."
    scale:
      label: "Frequency"
      options:
        - label: "Not at all"
          value: 0
        - label: "Several days"
          value: 1
        - label: "More than half the days"
          value: 2
        - label: "Nearly every day"
          value: 3
    questions:
      - id: "gad_worry"
        text: "Feeling nervous, anxious, or on edge"
        dimension: "Emotional"
      - id: "gad_control"
        text: "Not being able to stop or control worrying"
        dimension: "Cognitive"
      - id: "gad_excessive"
        text: "Worrying too much about different things"
        dimension: "Cognitive"
      - id: "gad_trouble"
        text: "Trouble relaxing"
        dimension: "Physical"
      - id: "gad_restless"
        text: "Being so restless that it's hard to sit still"
        dimension: "Physical"
      - id: "gad_irritable"
        text: "Becoming easily annoyed or irritable"
        dimension: "Emotional"
      - id: "gad_fear"
        text: "Feeling afraid, as if something awful might happen"
        dimension: "Emotional"
    scoring:
      method: "sum"
      overall:
        label: "Generalized anxiety severity"
        bands:
          - min: 0
            max: 4
            label: "Minimal"
            color: "#22c55e"
            description: "Anxiety levels are manageable; continue supportive practices."
          - min: 5
            max: 9
            label: "Mild"
            color: "#facc15"
            description: "Some anxiety present — self-care and stress management may help."
          - min: 10
            max: 14
            label: "Moderate"
            color: "#f97316"
            description: "Moderate anxiety — consider speaking with a clinician."
          - min: 15
            max: 21
            label: "Severe"
            color: "#dc2626"
            description: "High anxiety levels — professional support can provide relief."
      dimensions:
        - id: "Cognitive"
          label: "Worry patterns"
          bands:
            - min: 0
              max: 2
              label: "Calm"
            - min: 3
              max: 4
              label: "Noticing"
            - min: 5
              max: 6
              label: "Preoccupied"
        - id: "Physical"
          label: "Body tension"
          bands:
            - min: 0
              max: 1
              label: "Relaxed"
            - min: 2
              max: 3
              label: "Tense"
            - min: 4
              max: 6
              label: "Agitated"
        - id: "Emotional"
          label: "Emotional intensity"
          bands:
            - min: 0
              max: 2
              label: "Steady"
            - min: 3
              max: 4
              label: "Reactive"
            - min: 5
              max: 9
              label: "Intense"

  - id: "panic"
    title: "Panic & Physical Anxiety"
    subtitle: "Panic attack patterns & physical symptoms"
    themeColor: "#f43f5e"
