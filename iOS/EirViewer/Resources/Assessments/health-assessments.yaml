  - id: "myers-briggs"
    title: "16 Personalities Type Indicator"
    subtitle: "MBTI-inspired personality assessment"
    themeColor: "#9333ea"
    category: "Personality"
    description: >-
      Explore your personality preferences across four dimensions: how you focus your energy (Extraversion/Introversion), how you take in information (Sensing/Intuition), how you make decisions (Thinking/Feeling), and how you approach life (Judging/Perceiving). This assessment helps you understand your natural preferences and communication style.
    instructions:
      - "Answer based on your natural preferences, not how you think you should be."
      - "There are no right or wrong answers — each preference has strengths."
      - "Consider how you naturally show up in different situations."
    scale:
      label: "Preference"
      options:
        - label: "Strongly prefer A"
          value: 1
        - label: "Moderately prefer A"
          value: 2
        - label: "Slightly prefer A"
          value: 3
        - label: "Neutral"
          value: 4
        - label: "Slightly prefer B"
          value: 5
        - label: "Moderately prefer B"
          value: 6
        - label: "Strongly prefer B"
          value: 7
    questions:
      - id: "mbti_ei_1"
        text: "I feel energized by being around others (A) vs. I feel energized by spending time alone (B)"
        dimension: "Extraversion/Introversion"
      - id: "mbti_ei_2"
        text: "I prefer to think out loud and process externally (A) vs. I prefer to think internally before sharing (B)"
        dimension: "Extraversion/Introversion"
      - id: "mbti_ei_3"
        text: "I enjoy group activities and social gatherings (A) vs. I prefer one-on-one or small group interactions (B)"
        dimension: "Extraversion/Introversion"
      - id: "mbti_sn_1"
        text: "I focus on concrete facts and details (A) vs. I focus on patterns, possibilities, and the big picture (B)"
        dimension: "Sensing/Intuition"
      - id: "mbti_sn_2"
        text: "I prefer practical, step-by-step approaches (A) vs. I prefer conceptual, flexible approaches (B)"
        dimension: "Sensing/Intuition"
      - id: "mbti_sn_3"
        text: "I trust what I can see, hear, and experience directly (A) vs. I trust insights, hunches, and underlying meanings (B)"
        dimension: "Sensing/Intuition"
      - id: "mbti_tf_1"
        text: "I make decisions based on logic and objective analysis (A) vs. I make decisions based on values and how they affect people (B)"
        dimension: "Thinking/Feeling"
      - id: "mbti_tf_2"
        text: "I value fairness and consistency (A) vs. I value harmony and individual circumstances (B)"
        dimension: "Thinking/Feeling"
      - id: "mbti_tf_3"
        text: "I tend to be direct and straightforward (A) vs. I tend to be considerate and tactful (B)"
        dimension: "Thinking/Feeling"
      - id: "mbti_jp_1"
        text: "I prefer structure, plans, and closure (A) vs. I prefer flexibility, spontaneity, and keeping options open (B)"
        dimension: "Judging/Perceiving"
      - id: "mbti_jp_2"
        text: "I work best with deadlines and clear expectations (A) vs. I work best when I can adapt and respond to changes (B)"
        dimension: "Judging/Perceiving"
      - id: "mbti_jp_3"
        text: "I like to make decisions quickly and move forward (A) vs. I like to gather more information before deciding (B)"
        dimension: "Judging/Perceiving"
    scoring:
      method: "average"
      overall:
        label: "Personality type profile"
        bands:
          - min: 1
            max: 2.9
            label: "Strong preference"
            color: "#10b981"
            description: "Clear preference in this dimension."
          - min: 3
            max: 4.9
            label: "Moderate preference"
            color: "#facc15"
            description: "Moderate preference with some flexibility."
          - min: 5
            max: 7
            label: "Balanced"
            color: "#3b82f6"
            description: "You show flexibility across both preferences."
      dimensions:
        - id: "Extraversion/Introversion"
          label: "Energy focus"
          description: "Where you direct your energy and attention."
          bands:
            - min: 1
              max: 3
              label: "Extraversion"
            - min: 4
              max: 4
              label: "Balanced"
            - min: 5
              max: 7
              label: "Introversion"
        - id: "Sensing/Intuition"
          label: "Information processing"
          description: "How you prefer to take in and process information."
          bands:
            - min: 1
              max: 3
              label: "Sensing"
            - min: 4
              max: 4
              label: "Balanced"
            - min: 5
              max: 7
              label: "Intuition"
        - id: "Thinking/Feeling"
          label: "Decision making"
          description: "How you prefer to make decisions and evaluate information."
          bands:
            - min: 1
              max: 3
              label: "Thinking"
            - min: 4
              max: 4
              label: "Balanced"
            - min: 5
              max: 7
              label: "Feeling"
        - id: "Judging/Perceiving"
          label: "Lifestyle approach"
          description: "How you approach structure and flexibility in your life."
          bands:
            - min: 1
              max: 3
              label: "Judging"
            - min: 4
              max: 4
              label: "Balanced"
            - min: 5
              max: 7
              label: "Perceiving"

