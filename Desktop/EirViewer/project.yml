name: EirViewer
options:
  bundleIdPrefix: com.eir
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

schemes:
  EirViewer:
    build:
      targets:
        EirViewer: all
        EirViewerTests: [test]
    test:
      targets:
        - EirViewerTests

packages:
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: "5.0.0"
  SQLiteVec:
    url: https://github.com/jkrukowski/SQLiteVec
    from: "0.0.9"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    revision: "e33eba8513595bde535719c48fedcb10ade5af57"

targets:
  EirViewer:
    type: application
    platform: macOS
    sources:
      - path: Sources/EirViewer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eir.viewer
        PRODUCT_NAME: "Eir Viewer"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "4"
        DEVELOPMENT_TEAM: YJ9A3JT299
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: EirViewer.entitlements
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: NO
    dependencies:
      - package: Yams
      - package: SQLiteVec
        product: SQLiteVec
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
  EirViewerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/EirViewerTests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        ARCHS: arm64
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Eir Viewer.app/Contents/MacOS/Eir Viewer"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: EirViewer
