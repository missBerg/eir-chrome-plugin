<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eir Stories Preview</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@500;700;800&display=swap');

        :root {
            --ink: #3d3a36;
            --muted: #7a756c;
            --teal: #1e94a8;
            --aura: linear-gradient(135deg, #d4a76a 0%, #cdb687 30%, #b6c3b3 58%, #9ec7e1 100%);
        }

        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            width: 1200px;
            height: 630px;
            overflow: hidden;
        }

        body {
            font-family: "Geist", system-ui, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 10%, rgba(212,167,106,0.18), transparent 22%),
                radial-gradient(circle at 88% 80%, rgba(139,184,206,0.16), transparent 24%),
                linear-gradient(180deg, #fbfbf8 0%, #f4f1ea 100%);
        }

        .frame {
            width: 100%;
            height: 100%;
            padding: 32px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            min-height: 52px;
            padding: 0 18px;
            border-radius: 999px;
            background: rgba(255, 249, 240, 0.88);
            color: var(--muted);
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .eyebrow::before {
            content: "";
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--teal);
            box-shadow: 0 0 0 8px rgba(30, 148, 168, 0.12);
        }

        h1 {
            margin: 48px 0 22px;
            max-width: 9.6ch;
            font-size: 82px;
            line-height: 0.93;
            letter-spacing: -0.08em;
            font-weight: 800;
        }

        h1 span {
            background: var(--aura);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        p {
            margin: 0;
            max-width: 20ch;
            color: var(--muted);
            font-size: 24px;
            line-height: 1.34;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="frame">
        <div class="eyebrow">Story first. Health information optional.</div>
        <h1>Share your <span>health journey</span>. Help someone else navigate theirs.</h1>
        <p>Eir Stories is a privacy-conscious platform for health journeys. Stories can stand on their own. Structured health context and evidence are optional.</p>
    </div>
</body>
</html>
