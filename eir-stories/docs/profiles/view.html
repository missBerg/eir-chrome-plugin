<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Eir Stories</title>
    <meta name="description" content="A public health profile on Eir Stories.">
    <link rel="icon" href="https://eir-design-system.netlify.app/icon-teal.png">
    <link rel="stylesheet" href="../stories-ui.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap');</style>
</head>
<body>
    <header class="site-header">
        <div class="shell site-header__inner">
            <a class="brand" href="../index.html" aria-label="Eir Stories home">
                <span class="brand__mark" aria-hidden="true"><img src="https://eir-design-system.netlify.app/icon-white.png" alt=""></span>
                <span><span class="brand__eyebrow">stories.eir.space</span><span class="brand__name">Eir Stories</span></span>
            </a>
            <nav class="nav" aria-label="Primary">
                <a href="../stories/index.html">Stories</a>
                <a href="../topics/index.html">Topics</a>
                <a href="./index.html">Profiles</a>
                <a href="../messages/index.html">Inbox</a>
                <a id="createNavLink" href="../app/index.html">App</a>
                <a id="sessionNavCta" class="nav__cta" href="../app/index.html">Start your story</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-hero">
            <div class="shell">
                <article id="profileRoot" class="surface story-header"></article>
            </div>
        </section>
        <section>
            <div class="shell story-layout">
                <div class="story-main">
                    <article class="surface section-card">
                        <h2>Public stories</h2>
                        <div id="profileStories" class="stories-grid stories-grid--single"></div>
                    </article>
                    <article class="surface section-card">
                        <div class="section-card__head">
                            <h2>Send a message</h2>
                            <div id="messageStatus" class="field-note"></div>
                        </div>
                        <form id="messageForm" class="comment-form">
                            <textarea id="messageInput" placeholder="Write a thoughtful message request, a thank-you, or a specific question about their story."></textarea>
                            <div class="comment-form__actions">
                                <div id="messagePrompt" class="field-note">Log in to send a message.</div>
                                <button id="messageSubmit" class="button button--primary" type="submit">Send message</button>
                            </div>
                        </form>
                    </article>
                </div>
                <aside class="story-sidebar">
                    <article class="sidebar-card">
                        <h3>Health context</h3>
                        <ul id="profileContext"></ul>
                    </article>
                    <article class="sidebar-card">
                        <h3>Connection</h3>
                        <div id="profileActions" class="stack"></div>
                    </article>
                </aside>
            </div>
        </section>
    </main>

    <script>
        const API_BASE = (() => {
            const { protocol, hostname, port } = window.location;
            if ((hostname === "127.0.0.1" || hostname === "localhost") && port && port !== "4181") {
                return `${protocol}//127.0.0.1:4181`;
            }
            return "";
        })();

        let currentUser = null;
        let currentProfile = null;

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function slugFromQuery() {
            return new URLSearchParams(window.location.search).get("slug");
        }

        async function applySessionUi() {
            try {
                const response = await fetch(`${API_BASE}/api/me`, { credentials: "same-origin" });
                if (!response.ok) {
                    updateMessagingUi();
                    return;
                }
                const payload = await response.json();
                currentUser = payload.user;
                document.getElementById("sessionNavCta").textContent = payload.user.display_name;
                document.getElementById("sessionNavCta").href = "../app/index.html";
                document.getElementById("createNavLink").textContent = "My app";
                document.getElementById("createNavLink").href = "../app/index.html";
                updateMessagingUi();
                renderProfileActions();
            } catch {}
        }

        function updateMessagingUi() {
            const prompt = document.getElementById("messagePrompt");
            const submit = document.getElementById("messageSubmit");
            if (currentUser) {
                prompt.textContent = `Messaging as ${currentUser.display_name}.`;
                submit.disabled = false;
                return;
            }
            prompt.textContent = "Log in to send a message.";
            submit.disabled = false;
        }

        function renderProfileActions() {
            const root = document.getElementById("profileActions");
            if (!currentProfile) {
                root.innerHTML = "";
                return;
            }
            root.innerHTML = `
                <button id="followButton" class="button button--secondary" type="button">${currentProfile.is_following ? "Following" : "Follow profile"}</button>
                <div class="field-note">${escapeHtml(currentProfile.comment_policy)} comments • ${escapeHtml(currentProfile.messaging_policy)}</div>
                <div class="field-note">${escapeHtml(currentProfile.follower_count)} followers • ${escapeHtml(currentProfile.story_count)} public stories</div>
            `;
            document.getElementById("followButton").addEventListener("click", toggleFollow);
        }

        async function toggleFollow() {
            const status = document.getElementById("messageStatus");
            if (!currentUser) {
                status.textContent = "Log in before following profiles.";
                return;
            }
            try {
                const response = await fetch(`${API_BASE}/api/profiles/${encodeURIComponent(currentProfile.slug)}/follow`, {
                    method: "POST",
                    credentials: "same-origin"
                });
                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.error || "Failed to update follow.");
                }
                currentProfile.is_following = payload.is_following;
                currentProfile.follower_count += payload.is_following ? 1 : -1;
                renderProfileActions();
                status.textContent = payload.is_following ? "Now following profile." : "Profile unfollowed.";
            } catch (error) {
                status.textContent = error.message;
            }
        }

        async function loadProfile() {
            const slug = slugFromQuery();
            if (!slug) {
                document.getElementById("profileRoot").innerHTML = "<h1>Profile not found</h1>";
                return;
            }
            const response = await fetch(`${API_BASE}/api/profiles/${encodeURIComponent(slug)}`, { cache: "no-store", credentials: "same-origin" });
            if (!response.ok) {
                document.getElementById("profileRoot").innerHTML = "<h1>Profile not found</h1>";
                return;
            }
            const payload = await response.json();
            const profile = payload.profile;
            const stories = payload.stories || [];
            currentProfile = profile;

            document.title = `${profile.display_name} | Eir Stories`;
            document.getElementById("profileRoot").innerHTML = `
                <div class="story-header__top">
                    <span class="pill">${escapeHtml(profile.profile_mode)}</span>
                    <span class="pill">${escapeHtml(profile.country || "Global")}</span>
                    <span class="pill">${escapeHtml(profile.follower_count)} followers</span>
                </div>
                <h1>${escapeHtml(profile.display_name)}</h1>
                <p class="story-header__summary">${escapeHtml(profile.bio || "Sharing a health journey to help other people navigate theirs.")}</p>
                <div class="story-actions">
                    <span class="action-chip">${escapeHtml(profile.primary_concern || "Health journey")}</span>
                    ${(profile.conditions || []).slice(0, 3).map((tag) => `<span class="pill">${escapeHtml(tag)}</span>`).join("")}
                </div>
            `;

            document.getElementById("profileStories").innerHTML = stories.length
                ? stories.map((story) => `
                    <a class="story-card" href="../stories/view.html?slug=${encodeURIComponent(story.slug)}">
                        <div class="story-card__meta">
                            <span class="pill">${escapeHtml(story.country)}</span>
                            <span class="pill">${escapeHtml(story.comment_count || 0)} comments</span>
                            ${story.source_label ? `<span class="pill">From ${escapeHtml(story.source_label)}</span>` : ""}
                        </div>
                        <div>
                            <h3>${escapeHtml(story.title)}</h3>
                            <p>${escapeHtml(story.summary)}</p>
                        </div>
                        <div class="story-card__tags">
                            ${(story.conditions || []).map((tag) => `<span class="pill">${escapeHtml(tag)}</span>`).join("")}
                            ${(story.helped || []).slice(0, 1).map((tag) => `<span class="pill">Helped: ${escapeHtml(tag)}</span>`).join("")}
                        </div>
                    </a>
                `).join("")
                : `<p>No public stories yet.</p>`;

            document.getElementById("profileContext").innerHTML = `
                <li>Primary focus: ${escapeHtml(profile.primary_concern || "Health journey")}</li>
                <li>Conditions: ${escapeHtml((profile.conditions || []).join(", ") || "Not specified")}</li>
                <li>Symptom themes: ${escapeHtml((profile.symptom_themes || []).join(", ") || "Not specified")}</li>
                <li>Visibility: ${escapeHtml(profile.visibility)}</li>
            `;

            renderProfileActions();
        }

        async function submitMessage(event) {
            event.preventDefault();
            const status = document.getElementById("messageStatus");
            const body = document.getElementById("messageInput").value.trim();
            if (!currentUser) {
                status.textContent = "Log in before sending a message.";
                return;
            }
            if (!body) {
                status.textContent = "Write a message first.";
                return;
            }
            try {
                const response = await fetch(`${API_BASE}/api/profiles/${encodeURIComponent(currentProfile.slug)}/messages`, {
                    method: "POST",
                    credentials: "same-origin",
                    headers: { "content-type": "application/json" },
                    body: JSON.stringify({ body }),
                });
                const text = await response.text();
                const payload = text ? JSON.parse(text) : {};
                if (!response.ok) {
                    throw new Error(payload.error || "Failed to send message.");
                }
                document.getElementById("messageInput").value = "";
                status.textContent = "Message sent.";
            } catch (error) {
                status.textContent = error.message;
            }
        }

        document.getElementById("messageForm").addEventListener("submit", submitMessage);
        loadProfile();
        applySessionUi();
    </script>
</body>
</html>
