name: Sync Unlock Issues

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/unlock-countries.json"
      - "scripts/sync-unlock-issues.mjs"
      - ".github/workflows/sync-unlock-issues.yml"
  issue_comment:
    types:
      - created
      - edited
      - deleted
  schedule:
    - cron: "23 * * * *"

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync country issues and claim state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UNLOCK_GITHUB_REPO: BirgerMoell/eir-open-apps
        run: node scripts/sync-unlock-issues.mjs

      - name: Commit updated unlock issue data
        run: |
          if git diff --quiet docs/unlock-issues.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/unlock-issues.json
          git commit -m "Sync unlock issue claim state"
          git push
